st3215_hardware:
  port: "/dev/ttyUSB0"
  baudrate: 1000000
  timeout_ms: 100

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
      
    position_controller:
      type: position_controllers/JointTrajectoryController
      
    velocity_controller:
      type: velocity_controllers/JointTrajectoryController
      
    effort_controller:
      type: effort_controllers/JointTrajectoryController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - joint_1
      - joint_2

position_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
    interface_name: position
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.6
      joint_1:
        trajectory: 0.05
        goal: 0.03
      joint_2:
        trajectory: 0.05
        goal: 0.03

velocity_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
    interface_name: velocity
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

effort_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
    interface_name: effort
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
      - effort
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false